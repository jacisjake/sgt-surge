version: "3"

services:
  sgt-surge:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: sgt-surge-bot
    restart: always
    env_file:
      - ../.env
    environment:
      - TZ=America/New_York
    ports:
      - "8080:8080"
    volumes:
      - sgt-surge-state:/app/state
      - sgt-surge-logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/status || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  sgt-surge-state:
  sgt-surge-logs:
